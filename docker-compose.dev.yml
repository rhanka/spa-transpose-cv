services:
  api:
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
      - api_data:/data
    command: sh -c "npm install && npm run dev"

  ui:
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:${API_PORT:-8787}/api}

volumes:
  api_node_modules:
  ui_node_modules:
