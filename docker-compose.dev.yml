services:
  api:
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      tenant-storage-seed:
        condition: service_completed_successfully
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
      - api_data:/data
    environment:
      - TENANT_STORAGE_BACKEND=${DEV_TENANT_STORAGE_BACKEND:-s3}
      - TENANT_S3_BUCKET=${DEV_TENANT_S3_BUCKET:-cv-transpose-dev}
      - TENANT_S3_REGION=${DEV_TENANT_S3_REGION:-fr-par}
      - TENANT_S3_ENDPOINT=${DEV_TENANT_S3_ENDPOINT:-http://minio:9000}
      - TENANT_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - TENANT_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - SMTP_HOST=${SMTP_HOST:-maildev}
    command: sh -c "npm install && npm run dev"

  ui:
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    command: sh -c "npm install && npx svelte-kit sync && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:${API_PORT:-8787}/api}

  maildev:
    image: maildev/maildev:2.1.0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:1080', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${MAILDEV_SMTP_PORT:-1025}:1025"
      - "${MAILDEV_UI_PORT:-1080}:1080"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
          echo "waiting for minio..."
          sleep 1
        done
        mc mb --ignore-existing local/${DEV_TENANT_S3_BUCKET:-cv-transpose-dev} || true
        mc anonymous set none local/${DEV_TENANT_S3_BUCKET:-cv-transpose-dev} || true
        mc rm --recursive --force local/${DEV_TENANT_S3_BUCKET:-cv-transpose-dev}/tenants || true
        mc rm --force local/${DEV_TENANT_S3_BUCKET:-cv-transpose-dev}/registry.json || true
    restart: "no"

  tenant-storage-seed:
    image: ${REGISTRY:-local}/${API_IMAGE_NAME:-transpose-cv-api}:${API_VERSION:-latest}
    build:
      context: ./api
      dockerfile: Dockerfile
      target: ${TARGET:-development}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
      - api_data:/data
    working_dir: /app
    environment:
      - NODE_ENV=development
      - DATA_DIR=/data
      - TENANT_STORAGE_BACKEND=s3
      - TENANT_S3_BUCKET=${DEV_TENANT_S3_BUCKET:-cv-transpose-dev}
      - TENANT_S3_REGION=${DEV_TENANT_S3_REGION:-fr-par}
      - TENANT_S3_ENDPOINT=${DEV_TENANT_S3_ENDPOINT:-http://minio:9000}
      - TENANT_S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - TENANT_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - TENANT_S3_PREFIX=
    command: sh -c "npm install && npx tsx scripts/migrate-tenants-to-s3.ts _default scalian"
    restart: "no"

volumes:
  api_node_modules:
  ui_node_modules:
  minio_data:
