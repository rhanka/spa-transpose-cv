apiVersion: v1
kind: ConfigMap
metadata:
  name: transpose-cv-api-config
  namespace: transpose-cv
  labels:
    app.kubernetes.io/name: transpose-cv
    app.kubernetes.io/component: api
data:
  NODE_ENV: "production"
  API_PORT: "8686"
  LLM_PROVIDER: "anthropic"
  LLM_MESH: "false"
  CORS_ALLOWED_ORIGINS: "https://transpose-cv.sent-tech.ca"
  SESSION_MAX_AGE_HOURS: "48"
  MAX_CONCURRENT_AGENTS: "5"
  MAX_UPLOAD_SIZE_MB: "50"
  DATA_DIR: "/data"
  TENANT_STORAGE_BACKEND: "s3"
  TENANT_S3_BUCKET: "transpose-cv"
  TENANT_S3_REGION: "fr-par"
  TENANT_S3_ENDPOINT: "https://s3.fr-par.scw.cloud"
  TENANT_S3_PREFIX: ""
  ADMIN_TOKEN_TTL_MINUTES: "720"
  ADMIN_OTP_TTL_MINUTES: "15"
  SMTP_PORT: "1025"
  SMTP_SECURE: "false"
