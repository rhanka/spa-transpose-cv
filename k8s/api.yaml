apiVersion: apps/v1
kind: Deployment
metadata:
  name: transpose-cv-api
  namespace: transpose-cv
  labels:
    app.kubernetes.io/name: transpose-cv
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transpose-cv
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transpose-cv
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: transpose-cv-registry
      containers:
        - name: api
          image: rg.fr-par.scw.cloud/transpose-cv/transpose-cv-api:REPLACE_WITH_GIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8686
          envFrom:
            - configMapRef:
                name: transpose-cv-api-config
            - secretRef:
                name: transpose-cv-api-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-tmp
              mountPath: /var/tmp
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: 1500m
              memory: 1800Mi
              ephemeral-storage: 3Gi
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: var-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: transpose-cv-api
  namespace: transpose-cv
  labels:
    app.kubernetes.io/name: transpose-cv
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: transpose-cv
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8686
      targetPort: http
