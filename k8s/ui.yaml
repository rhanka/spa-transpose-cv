apiVersion: apps/v1
kind: Deployment
metadata:
  name: transpose-cv-ui
  namespace: transpose-cv
  labels:
    app.kubernetes.io/name: transpose-cv
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transpose-cv
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transpose-cv
        app.kubernetes.io/component: ui
    spec:
      imagePullSecrets:
        - name: transpose-cv-registry
      containers:
        - name: ui
          image: rg.fr-par.scw.cloud/transpose-cv/transpose-cv-ui:REPLACE_WITH_GIT_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5173
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: transpose-cv-ui
  namespace: transpose-cv
  labels:
    app.kubernetes.io/name: transpose-cv
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: transpose-cv
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 5173
      targetPort: http
