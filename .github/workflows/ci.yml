name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ${{ secrets.REGISTRY }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'Makefile'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
            ui:
              - 'ui/**'
              - '.github/workflows/ci.yml'

  # ── Build & typecheck API ────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: make build-api
      - name: Save API image
        run: |
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep transpose-cv-api | head -1)
          docker save $IMAGE -o api-image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: api-image.tar

  typecheck-api:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd api && npm install && npx tsc --noEmit

  # ── Build & typecheck UI ─────────────────────────────────────────
  build-ui:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.ui == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & typecheck
        working-directory: ui
        run: npm install && npm run check
      - name: Build
        working-directory: ui
        env:
          VITE_API_BASE_URL: https://scalian-cv-api.sent-tech.ca/api
        run: npm run build
      - name: Add CNAME
        run: echo "scalian-cv.sent-tech.ca" > ui/build/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/build

  # ── Publish API to SCW registry ──────────────────────────────────
  publish-api:
    runs-on: ubuntu-latest
    needs: [changes, build-api, typecheck-api]
    if: needs.changes.outputs.api == 'true' && github.ref == 'refs/heads/master'
    env:
      DOCKER_USERNAME: nologin
      DOCKER_PASSWORD: ${{ secrets.SCW_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: api-image
          path: .
      - name: Load and push
        run: |
          docker load -i api-image.tar
          echo "$DOCKER_PASSWORD" | docker login $REGISTRY -u $DOCKER_USERNAME --password-stdin
          make publish-api

  # ── Deploy API (rollout SCW container) ───────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    needs: [changes, publish-api]
    if: needs.changes.outputs.api == 'true' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: scaleway/action-scw@v0
        with:
          save-config: true
          export-config: true
          version: v2.24.0
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
      - name: Deploy API (rollout)
        run: make deploy-api

  # ── Deploy UI to GitHub Pages ────────────────────────────────────
  # If BOTH api+ui changed: UI deploys AFTER API succeeds
  # If ONLY ui changed: UI deploys immediately after build
  deploy-ui-after-api:
    runs-on: ubuntu-latest
    needs: [changes, build-ui, deploy-api]
    if: needs.changes.outputs.ui == 'true' && needs.changes.outputs.api == 'true' && github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-ui-only:
    runs-on: ubuntu-latest
    needs: [changes, build-ui]
    if: needs.changes.outputs.ui == 'true' && needs.changes.outputs.api != 'true' && github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
