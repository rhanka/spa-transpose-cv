name: CI

on:
  push:
    branches: [master]
    tags:
      - 'release-v*'
  pull_request:
    branches: [master]

env:
  REGISTRY: ${{ secrets.REGISTRY }}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & typecheck API ────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: make build-api
      - name: Save API image
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'release-v')
        run: |
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep transpose-cv-api | head -1)
          docker save $IMAGE -o api-image.tar
      - uses: actions/upload-artifact@v4
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'release-v')
        with:
          name: api-image
          path: api-image.tar

  typecheck-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm --workspace api run typecheck

  # ── Build & typecheck UI ─────────────────────────────────────────
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & typecheck
        working-directory: ui
        run: npm install && npm run check
      - name: Build
        working-directory: ui
        env:
          VITE_API_BASE_URL: https://cv-api.sent-tech.ca/api
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'release-v')
        with:
          path: ui/build

  # ── Publish API to SCW registry ──────────────────────────────────
  publish-api:
    runs-on: ubuntu-latest
    needs: [build-api, typecheck-api]
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'release-v')
    env:
      DOCKER_USERNAME: nologin
      DOCKER_PASSWORD: ${{ secrets.SCW_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: api-image
          path: .
      - name: Load and push
        run: |
          docker load -i api-image.tar
          echo "$DOCKER_PASSWORD" | docker login $REGISTRY -u $DOCKER_USERNAME --password-stdin
          make publish-api

  # ── Deploy API (rollout SCW container) ───────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    needs: [publish-api]
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'release-v')
    steps:
      - uses: actions/checkout@v4
      - uses: scaleway/action-scw@v0
        with:
          save-config: true
          export-config: true
          version: v2.24.0
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
      - name: Deploy API (rollout)
        run: make deploy-api

  # ── Deploy UI to GitHub Pages ───────────────────────────────────
  # Production deploys are release-tag only. Pushes to master and PRs only
  # build/typecheck, so UAT can happen before creating a release tag.
  deploy-ui-release:
    runs-on: ubuntu-latest
    needs: [build-ui, deploy-api]
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'release-v')
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
