name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ${{ secrets.REGISTRY }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      global: ${{ steps.filter.outputs.global }}
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            global:
              - 'Makefile'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
            api:
              - 'api/**'
            ui:
              - 'ui/**'

  # ── Build API image ──────────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.global == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: make build-api
      - name: Save API image as artifact
        run: |
          source .env.example 2>/dev/null || true
          API_VERSION=$(find api/src api/package.json api/Dockerfile -type f 2>/dev/null | LC_ALL=C sort | xargs cat 2>/dev/null | sha1sum | sed 's/\(......\).*/\1/')
          docker save ${REGISTRY:-rg.fr-par.scw.cloud/nc-reg}/transpose-cv-api:${API_VERSION} -o api-image.tar
      - uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: api-image.tar

  # ── Typecheck API ────────────────────────────────────────────────
  typecheck-api:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.global == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: cd api && npm install && npx tsc --noEmit

  # ── Build & Typecheck UI ─────────────────────────────────────────
  build-ui:
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.global == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install & typecheck
        working-directory: ui
        run: npm install && npm run check
      - name: Build
        working-directory: ui
        env:
          VITE_API_BASE_URL: https://scalian-cv-api.sent-tech.ca/api
        run: npm run build
      - name: Add CNAME
        run: echo "scalian-cv.sent-tech.ca" > ui/build/CNAME
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/build

  # ── Publish API image to SCW registry ────────────────────────────
  publish-api:
    runs-on: ubuntu-latest
    needs: [changes, build-api, typecheck-api]
    if: (needs.changes.outputs.api == 'true' || needs.changes.outputs.global == 'true') && github.ref == 'refs/heads/master'
    env:
      DOCKER_USERNAME: nologin
      DOCKER_PASSWORD: ${{ secrets.SCW_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: api-image
          path: .
      - name: Load and push API image
        run: |
          docker load -i api-image.tar
          echo "$DOCKER_PASSWORD" | docker login $REGISTRY -u $DOCKER_USERNAME --password-stdin
          make publish-api

  # ── Deploy API to Scaleway ───────────────────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    needs: [changes, publish-api]
    if: (needs.changes.outputs.api == 'true' || needs.changes.outputs.global == 'true') && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Scaleway CLI
        uses: scaleway/action-scw@v0
        with:
          save-config: true
          export-config: true
          version: v2.24.0
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
      - name: Deploy API (rollout)
        run: make deploy-api

  # ── Deploy UI to GitHub Pages ────────────────────────────────────
  deploy-ui:
    runs-on: ubuntu-latest
    needs: [changes, build-ui]
    if: (needs.changes.outputs.ui == 'true' || needs.changes.outputs.global == 'true') && github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
