<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/SENT-logo-squared.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sent Tech | CV Transpose</title>
    <meta name="description" content="Mettez vos CV en forme dans un espace adapté à chaque société." />
    <script>
      (() => {
        const legacyTenantByHost = {
          'scalian-cv.sent-tech.ca': 'scalian',
        };
        const canonicalHost = 'cv.sent-tech.ca';
        const legacyTenant = legacyTenantByHost[window.location.hostname];

        if (!legacyTenant) {
          return;
        }

        const tenantPrefix = `/${legacyTenant}`;
        const currentPath = window.location.pathname || '/';
        const canonicalPath = currentPath === '/'
          ? `${tenantPrefix}/`
          : currentPath === tenantPrefix || currentPath.startsWith(`${tenantPrefix}/`)
            ? currentPath
            : `${tenantPrefix}${currentPath}`;

        window.location.replace(`https://${canonicalHost}${canonicalPath}${window.location.search}${window.location.hash}`);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
